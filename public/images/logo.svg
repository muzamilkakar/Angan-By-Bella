<svg xmlns="http://www.w3.org/2000/svg" width="180" height="72" viewBox="0 0 180 72">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B08D5B"/>
      <stop offset="50%" stop-color="#C4A06A"/>
      <stop offset="100%" stop-color="#9A7D4C"/>
    </linearGradient>
    <linearGradient id="arch-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A2C1A"/>
      <stop offset="100%" stop-color="#2E1A0F"/>
    </linearGradient>
  </defs>

  <!-- Courtyard arch motif -->
  <g transform="translate(14, 6)">
    <!-- Arch shape -->
    <path d="M0,48 Q0,0 22,0 Q44,0 44,48"
          fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.7"/>
    <!-- Inner arch -->
    <path d="M6,48 Q6,8 22,8 Q38,8 38,48"
          fill="none" stroke="url(#gold-grad)" stroke-width="1" opacity="0.4"/>
    <!-- Jali diamond lattice -->
    <polygon points="22,14 30,22 22,30 14,22"
             fill="none" stroke="url(#gold-grad)" stroke-width="0.8" opacity="0.5"/>
    <polygon points="22,18 28,22 22,26 16,22"
             fill="none" stroke="url(#gold-grad)" stroke-width="0.5" opacity="0.35"/>
  </g>

  <!-- Angan text -->
  <text x="78" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="#4A2C1A" letter-spacing="0.08em">Angan</text>

  <!-- By Bella subtext -->
  <text x="78" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="400" fill="#7A6A57" letter-spacing="0.3em" text-transform="uppercase">BY BELLA</text>

  <!-- Small jali diamond accent between text and subtext -->
  <polygon points="78,40 80,42 78,44 76,42" fill="#B08D5B" opacity="0.4"/>
</svg>
